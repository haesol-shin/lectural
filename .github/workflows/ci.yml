name: CI

on:
  push:
  pull_request:

jobs:
  offline-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv run --with pytest --with numpy pytest -q

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # Pinned deliberately: the validator is a release gate, so bump this
      # version on purpose rather than tracking a moving latest.
      - run: npm install -g @anthropic-ai/claude-code@2.1.177
      - run: claude plugin validate .
