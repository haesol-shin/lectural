name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate tag version
        shell: bash
        run: |
          plugin_version="$(jq -r '.version' .claude-plugin/plugin.json)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$plugin_version" ]; then
            echo "Tag version $tag_version does not match plugin.json version $plugin_version" >&2
            exit 1
          fi

      - name: Build release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 scripts/changelog_notes.py "$version" > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for [$version]; add one before tagging." >&2
            exit 1
          fi
          # The CHANGELOG link reference is the authoritative compare/tag URL.
          link="$(python3 scripts/changelog_notes.py "$version" --link)"
          {
            echo ""
            if [ -n "$link" ]; then
              echo "**Full changelog**: $link"
            else
              echo "**Full changelog**: https://github.com/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}"
            fi
          } >> release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
